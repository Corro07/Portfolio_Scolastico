<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davide Corrone - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #5b6ee1;
            --dark-blue: #4a5bc7;
            --white: #ffffff;
            --light-bg: #f4f5f9;
            --dark-text: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f4f5f9 0%, #e0e4f5 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark-text);
        }

        .welcome-card {
            background: var(--white);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .welcome-card:hover {
            transform: translateY(-10px);
        }

        .profile-icon {
            font-size: 4rem;
            color: var(--primary-blue);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--dark-text);
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .btn-enter {
            display: inline-block;
            padding: 15px 40px;
            background-color: var(--primary-blue);
            color: var(--white);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(91, 110, 225, 0.3);
        }

        .btn-enter:hover {
            background-color: var(--dark-blue);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(91, 110, 225, 0.4);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="profile-icon">
            <i class="fas fa-code"></i>
        </div>
        <h1>Davide Corrone</h1>
        <p>Portfolio Personale</p>
        
        <a href="home/home.html" class="btn-enter">Entra nel Sito</a>

        <div class="footer-note">
            © 2026 - Studente di Informatica
        </div>
    </div>

</body>
</html>
